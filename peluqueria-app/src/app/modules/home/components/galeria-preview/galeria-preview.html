<section class="galeria-preview">

  <div class="gp__cabecera">
    <span class="gp__eyebrow">Nuestro trabajo</span>
    <h2 class="gp__titulo">Galería</h2>
    <p class="gp__sub">Cada imagen cuenta una historia. Aquí contamos las nuestras.</p>
  </div>

  <div class="gp__grid">
    <div
      class="gp__item"
      *ngFor="let f of fotos"
      [class.gp__item--wide]="f.span === 'wide'"
      [class.gp__item--tall]="f.span === 'tall'">
      <img [src]="f.url" [alt]="f.titulo" loading="lazy" />
      <div class="gp__item-overlay">
        <span class="gp__item-titulo">{{ f.titulo }}</span>
      </div>
    </div>
  </div>

  <div class="gp__footer">
    <a routerLink="/galeria" class="gp__btn">Ver galería completa</a>
  </div>

</section>
