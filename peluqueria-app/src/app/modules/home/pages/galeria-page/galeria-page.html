<app-navbar></app-navbar>

<main class="galeria-wrapper">
  
  <header class="galeria-header">
    <h1>Nuestro Trabajo</h1>
    <p>Inspírate con los mejores estilos creados por el equipo de Aura Studio.</p>
  </header>

  <section class="filtros-container">
    <button 
      *ngFor="let cat of categorias" 
      class="btn-filtro" 
      [class.activo]="filtroActivo() === cat"
      (click)="cambiarFiltro(cat)">
      {{ cat }}
    </button>
  </section>

  <section class="mosaico-masonry">
    
    <div 
      *ngFor="let img of imagenesFiltradas()" 
      class="galeria-item"
      (click)="abrirLightbox(img)">
      
      <img [src]="img.url" [alt]="img.titulo" loading="lazy">
      
      <div class="overlay">
        <span class="categoria-tag">{{ img.categoria }}</span>
        <h3>{{ img.titulo }}</h3>
        <i class="bi bi-arrows-fullscreen icono-expandir"></i>
      </div>

    </div>

  </section>

  <div *ngIf="imagenesFiltradas().length === 0" class="mensaje-vacio">
    <p>Pronto subiremos más trabajos de esta categoría.</p>
  </div>

</main>

<div class="lightbox" *ngIf="imagenSeleccionada()" (click)="cerrarLightbox()">
  <button class="btn-cerrar-lightbox" (click)="cerrarLightbox()">×</button>
  
  <div class="lightbox-content" (click)="$event.stopPropagation()">
    <img [src]="imagenSeleccionada()?.url" [alt]="imagenSeleccionada()?.titulo">
    <div class="lightbox-info">
      <h2>{{ imagenSeleccionada()?.titulo }}</h2>
      <span class="badge">{{ imagenSeleccionada()?.categoria }}</span>
    </div>
  </div>
</div>
