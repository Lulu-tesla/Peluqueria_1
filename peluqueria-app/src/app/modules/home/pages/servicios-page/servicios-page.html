<app-navbar></app-navbar>

<main class="servicios-main">

  <!-- HERO -->
  <section class="servicios-hero">
    <span class="servicios-hero__eyebrow">Lo que ofrecemos</span>
    <h1 class="servicios-hero__titulo">Servicios</h1>
    <p class="servicios-hero__sub">Arte, técnica y dedicación en cada visita.</p>
    <div class="servicios-hero__linea"></div>
  </section>

  <!-- FILTROS -->
  <section class="servicios-filtros">
    <button
      *ngFor="let cat of categorias"
      class="filtro-btn"
      [class.activo]="categoriaActiva === cat"
      (click)="setCategoria(cat)">
      {{ cat | titlecase }}
    </button>
  </section>

  <!-- CARDS -->
  <section class="servicios-grid">
    <div class="servicio-card" *ngFor="let s of serviciosFiltrados">
      <div class="servicio-card__icono">{{ s.icono }}</div>
      <div class="servicio-card__body">
        <h3 class="servicio-card__nombre">{{ s.nombre }}</h3>
        <p class="servicio-card__desc">{{ s.descripcion }}</p>
        <div class="servicio-card__meta">
          <span class="servicio-card__duracion">⏱ {{ s.duracion }}</span>
          <span class="servicio-card__precio">{{ s.precio }}</span>
        </div>
      </div>
      <a routerLink="/auth/login" class="servicio-card__btn">Reservar</a>
    </div>
  </section>

  <!-- CTA FINAL -->
  <section class="servicios-cta">
    <p>¿No encontrás lo que buscás?</p>
    <a routerLink="/nosotros" class="btn-gold-outline">Contáctanos</a>
  </section>

</main>

<app-footer></app-footer>
