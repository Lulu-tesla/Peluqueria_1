<div class="recuperar-container">
  <div class="card">
    <div class="header">
      <h2>Recuperar contraseña</h2>
      <p>Te enviaremos un enlace a tu correo</p>
    </div>

    <div *ngIf="enviado" class="alerta-exito">
      ¡Correo enviado! Revisa tu bandeja de entrada.
    </div>

    <div *ngIf="errorMsg" class="alerta-error">
      {{ errorMsg }}
    </div>

    <form *ngIf="!enviado" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="campo">
        <label>Correo electrónico *</label>
        <input type="email" formControlName="email" placeholder="ana@correo.com">
        <span class="error" *ngIf="f['email'].touched && f['email'].errors?.['email']">
          Ingresa un correo válido
        </span>
      </div>

      <button type="submit" [disabled]="form.invalid || cargando" class="btn-primary">
        {{ cargando ? 'Enviando...' : 'Enviar enlace' }}
      </button>
    </form>

    <p class="login-link">
      <a routerLink="/login">Volver al inicio de sesión</a>
    </p>
  </div>
</div>
